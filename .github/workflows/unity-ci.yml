name: Unity Build Pipeline (Optimized)

on:
  push:
    branches:
      - main
      - development

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

jobs:

  # 1. New job for PlayMode tests
  testPlayMode:
    name: Test in Playmode
    runs-on: [self-hosted, ubuntu-mini-pc]
    
    # 🎯 FIX: Force unique working directory for parallel jobs to prevent file lock conflicts
    defaults:
      run:
        working-directory: ${{ runner.temp }}/ci-temp/${{ github.sha }}/playmode-test
    
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We check out the code directly into the unique job working directory

      - name: Cache Unity Library (Restore)
        uses: actions/cache@v4
        with:
          # Path must now be relative to the new working directory
          path: playmode-test/DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Run Tests (Playmode)
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          projectPath: "DynamicDungeon_Tool"
          testMode: playmode 
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.ref_name }}-playmode-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  # 2. New job for EditMode tests
  testEditMode:
    name: Test in Editmode
    runs-on: [self-hosted, ubuntu-mini-pc]
    
    # 🎯 FIX: Force unique working directory for parallel jobs to prevent file lock conflicts
    defaults:
      run:
        working-directory: ${{ runner.temp }}/ci-temp/${{ github.sha }}/editmode-test
    
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We check out the code directly into the unique job working directory

      - name: Cache Unity Library (Restore)
        uses: actions/cache@v4
        with:
          # Path must now be relative to the new working directory
          path: editmode-test/DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Run Tests (Editmode)
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          projectPath: "DynamicDungeon_Tool"
          testMode: editmode 
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.ref_name }}-editmode-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  buildWebGL:
    needs: [testPlayMode, testEditMode]
    name: Build WebGL

    runs-on: [self-hosted, ubuntu-mini-pc]
    if: github.ref_name != 'development'
    
    steps:
      
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library (Restore/Save)
        uses: actions/cache@v4
        with:
          path: DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Build WebGL Player
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL
          projectPath: "DynamicDungeon_Tool"
          webgl-template: 'Assets/WebGLTemplates/HonoursProjectTemplate'
          
      - name: Upload WebGL Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-WebGL-Build
          path: build/WebGL
          
      - name: Deploy to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          
          ./butler push build/WebGL mrbytesized/honoursprojectdemos:webgl --userversion ${{ github.ref_name }}-${{ github.run_number }}
