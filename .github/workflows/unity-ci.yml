name: Unity Build Pipeline (Optimized)

on:
  push:
    branches:
      - main
      - development

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

jobs:

  testAllModes:
    name: Test in ${{ matrix.testMode }}
    runs-on: [self-hosted, ubuntu-mini-pc]
    strategy:
      fail-fast: false
      matrix:
        projectPath: ["DynamicDungeon_Tool"]
        testMode:
          - playmode
          - editmode
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library (Restore)
        uses: actions/cache@v4
        with:
          path: ${{ matrix.projectPath }}/Library
          # UNIFIED CACHE KEY: Removed 'testMode' so both jobs share the same cache entry
          key: Library-${{ matrix.projectPath }}-${{ runner.os }}-${{ hashFiles(format('{0}/Assets/**', matrix.projectPath), format('{0}/Packages/**', matrix.projectPath), format('{0}/ProjectSettings/**', matrix.projectPath)) }}
          restore-keys: |
            Library-${{ matrix.projectPath }}-${{ runner.os }}-
            Library-${{ matrix.projectPath }}-
            Library-

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          projectPath: ${{ matrix.projectPath }}
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          # Ensures the container runs as 'will', but REQUIRES the host folder to be owned by 'will'
          runAsHostUser: true
          
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.ref_name }}-${{ matrix.testMode }}-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  buildWebGL:
    needs: testAllModes
    name: Build WebGL
    runs-on: [self-hosted, ubuntu-mini-pc]
    if: github.ref_name != 'development'
    
    steps:      
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library (Restore/Save)
        uses: actions/cache@v4
        with:
          path: DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Build WebGL Player
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL
          projectPath: "DynamicDungeon_Tool"
          customParameters: -webglTemplate Assets/WebGLTemplates/HonoursProjectTemplate
          chownFilesTo: ${{ github.actor }}
          
      - name: Upload WebGL Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-WebGL-Build
          path: build/WebGL
          
      - name: Deploy to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          # Securely download and use the official butler CLI
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip -o butler.zip
          chmod +x butler
          
          ./butler push build/WebGL mrbytesized/honoursprojectdemos:webgl --userversion ${{ github.ref_name }}-${{ github.run_number }}
