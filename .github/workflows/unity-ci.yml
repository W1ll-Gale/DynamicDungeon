name: Unity Build Pipeline (Optimized)

on:
  push:
    branches:
      - main
      - development

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

jobs:

  # 1. First: PlayMode tests
  testPlayMode:
    name: Test in Playmode
    runs-on: [self-hosted, ubuntu-mini-pc]
    
    steps:

      - name: Checkout Repository to Unique Path
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: PlayMode_Project 

      - name: Cache Unity Library (Restore)
        uses: actions/cache@v4
        with:
          path: PlayMode_Project/DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**', 'DynamicDungeon_Tool/Library/BuildSettings.asset') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Run Tests (Playmode)
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          projectPath: PlayMode_Project/DynamicDungeon_Tool
          testMode: playmode 
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          # Optimizations kept for robustness
          dockerWorkspaceDir: /playmode_workspace
          cleanProject: true
          # Reverted to running as root to bypass permission locks from previous runs
          
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.ref_name }}-playmode-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  # 2. Second: EditMode tests (Runs AFTER PlayMode to prevent file locks)
  testEditMode:
    needs: [testPlayMode] # <--- FIX: Forces sequential execution to avoid 'BlankProject' file locks
    name: Test in Editmode
    runs-on: [self-hosted, ubuntu-mini-pc]
    
    steps:

      - name: Checkout Repository to Unique Path
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: EditMode_Project

      - name: Cache Unity Library (Restore)
        uses: actions/cache@v4
        with:
          path: EditMode_Project/DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**', 'DynamicDungeon_Tool/Library/BuildSettings.asset') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Run Tests (Editmode)
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          projectPath: EditMode_Project/DynamicDungeon_Tool
          testMode: editmode 
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          # Optimizations kept for robustness
          dockerWorkspaceDir: /editmode_workspace
          cleanProject: true
          # Reverted to running as root to bypass permission locks from previous runs
          
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.ref_name }}-editmode-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  buildWebGL:
    needs: [testEditMode] # Update to wait for the last test job
    name: Build WebGL

    runs-on: [self-hosted, ubuntu-mini-pc]
    if: github.ref_name != 'development'
    
    steps:
      
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library (Restore/Save)
        uses: actions/cache@v4
        with:
          path: DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-DynamicDungeon_Tool-
            Library-

      - name: Build WebGL Player
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL
          projectPath: "DynamicDungeon_Tool"
          webgl-template: 'Assets/WebGLTemplates/HonoursProjectTemplate'
          
      - name: Upload WebGL Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-WebGL-Build
          path: build/WebGL
          
      - name: Deploy to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          
          ./butler push build/WebGL mrbytesized/honoursprojectdemos:webgl --userversion ${{ github.ref_name }}-${{ github.run_number }}
