name: Unity Build Pipeline (Optimized)

on:
  push:
    branches:
      - main
      - development

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

jobs:

  # 1. Parallel Testing (Runs on Methalox-1 and Methalox-2 simultaneously)
  testAllModes:
    name: Test in ${{ matrix.testMode }}
    runs-on: [self-hosted, ubuntu-mini-pc]
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - playmode
          - editmode
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library (Restore)
        uses: actions/cache@v4
        with:
          path: DynamicDungeon_Tool/Library
          # Unique cache key per runner/matrix ensures they don't overwrite each other
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-${{ matrix.testMode }}-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**', 'DynamicDungeon_Tool/Library/BuildSettings.asset') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-${{ matrix.testMode }}-
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        with:
          projectPath: "DynamicDungeon_Tool"
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+my.assembly.*'
          # Use the matrix value to ensure unique workspace naming in Docker
          dockerWorkspaceDir: /${{ matrix.testMode }}_workspace
          # Keeps action robust against edge cases
          cleanProject: true
          
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.ref_name }}-${{ matrix.testMode }}-Test-Results
          path: ${{ steps.tests.outputs.artifactsPath }}

  # 2. Build (Runs after BOTH tests finish)
  buildWebGL:
    needs: testAllModes
    name: Build WebGL
    runs-on: [self-hosted, ubuntu-mini-pc]
    if: github.ref_name != 'development'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library (Restore/Save)
        uses: actions/cache@v4
        with:
          path: DynamicDungeon_Tool/Library
          key: Library-DynamicDungeon_Tool-${{ runner.os }}-build-${{ hashFiles('DynamicDungeon_Tool/Assets/**', 'DynamicDungeon_Tool/Packages/**', 'DynamicDungeon_Tool/ProjectSettings/**') }}
          restore-keys: |
            Library-DynamicDungeon_Tool-${{ runner.os }}-build-
            Library-DynamicDungeon_Tool-${{ runner.os }}-
            Library-

      - name: Build WebGL Player
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL
          projectPath: "DynamicDungeon_Tool"
          webgl-template: 'Assets/WebGLTemplates/HonoursProjectTemplate'
          
      - name: Upload WebGL Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-WebGL-Build
          path: build/WebGL
          
      - name: Deploy to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          
          ./butler push build/WebGL mrbytesized/honoursprojectdemos:webgl --userversion ${{ github.ref_name }}-${{ github.run_number }}
